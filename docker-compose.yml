services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_automation_postgres
    environment:
      POSTGRES_USER: ai_automation
      POSTGRES_PASSWORD: ai_automation_secret
      POSTGRES_DB: ai_automation_db
    ports:
      - "5433:5432"
    volumes:
      - ai_automation_pg_data:/var/lib/postgresql/data
    networks:
      - ai-automation-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_automation -d ai_automation_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_automation_backend
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-ai_automation}
      DB_PASSWORD: ${DB_PASSWORD:-ai_automation_secret}
      DB_DATABASE: ${DB_DATABASE:-ai_automation_db}
      PORT: ${PORT:-3001}
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff}
      REPOSITORIES_BASE_PATH: ${REPOSITORIES_BASE_PATH:-/app/repos}
      GIT_COMMAND_TIMEOUT_MS: ${GIT_COMMAND_TIMEOUT_MS:-120000}
      TASK_MANAGER_HTTP_TIMEOUT_MS: ${TASK_MANAGER_HTTP_TIMEOUT_MS:-15000}
      TASK_MANAGER_DEFAULT_TASK_LIMIT: ${TASK_MANAGER_DEFAULT_TASK_LIMIT:-100}
      TASK_MANAGER_MAX_TASK_LIMIT: ${TASK_MANAGER_MAX_TASK_LIMIT:-100}
      TASKS_DEFAULT_LIMIT: ${TASKS_DEFAULT_LIMIT:-100}
      TASKS_MAX_LIMIT: ${TASKS_MAX_LIMIT:-200}
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src
      - repos_data:/app/repos
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-automation-net
    restart: unless-stopped

volumes:
  ai_automation_pg_data:
  repos_data:

networks:
  ai-automation-net:
    name: ai-automation-net
